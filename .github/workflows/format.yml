name: Format

on:
  pull_request:

permissions:
  contents: write

jobs:
  format:
    name: Auto-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile

      - run: bun run format

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: format"
