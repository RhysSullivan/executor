name: Publish (pkg.pr.new)

on:
  pull_request:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile

      - run: bun run build:packages

      - name: Build executor preview wrapper (linux-x64 binary)
        env:
          EXECUTOR_PREVIEW_CDN_URL: ${{ vars.EXECUTOR_PREVIEW_CDN_URL }}
          EXECUTOR_PREVIEW_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bun run --filter=executor build:preview

      - name: Upload preview binaries to R2
        # curl --aws-sigv4 handles large uploads directly against R2's S3
        # endpoint. Simpler than aws-cli (endpoint validation quirks) or
        # Bun.s3 (ConnectionRefused on ubuntu-latest for reasons unclear).
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          for tarball in apps/cli/dist/previews/*.tar.gz; do
            name=$(basename "$tarball")
            echo "Uploading $name → r2://executor-previews/$SHA/$name"
            curl --fail-with-body --silent --show-error \
              -X PUT "$R2_ENDPOINT/executor-previews/$SHA/$name" \
              --upload-file "$tarball" \
              --aws-sigv4 "aws:amz:auto:s3" \
              --user "$AWS_ACCESS_KEY_ID:$AWS_SECRET_ACCESS_KEY"
          done

      - run: npx pkg-pr-new publish --compact './apps/cli/dist/executor' './packages/core/sdk' './packages/plugins/*'
