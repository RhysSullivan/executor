name: Publish (pkg.pr.new)

on:
  pull_request:

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - run: bun install --frozen-lockfile

      - run: bun run build:packages

      - name: Build executor preview wrapper (linux-x64 binary)
        env:
          EXECUTOR_PREVIEW_CDN_URL: ${{ vars.EXECUTOR_PREVIEW_CDN_URL }}
          EXECUTOR_PREVIEW_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: bun run --filter=executor build:preview

      - name: Upload preview binaries to R2
        # Uses the S3-compatible endpoint rather than wrangler's `r2 object put`
        # because wrangler proxies through the Cloudflare API gateway, which
        # caps request bodies around 100MB. S3 multipart handles our ~100MB
        # linux binary without trouble.
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com
          SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: |
          for tarball in apps/cli/dist/previews/*.tar.gz; do
            name=$(basename "$tarball")
            echo "Uploading $name → s3://executor-previews/$SHA/$name"
            aws s3 cp "$tarball" "s3://executor-previews/$SHA/$name" \
              --endpoint-url "$R2_ENDPOINT" \
              --no-progress
          done

      - run: npx pkg-pr-new publish --compact './apps/cli/dist/executor' './packages/core/sdk' './packages/plugins/*'
